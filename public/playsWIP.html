<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/story.css">
    <link rel="stylesheet" href="css/fontELement.css">
    <link rel="icon" type="image/x-icon" href="../assets/icon.ico">
    <title>Story</title>
</head> 
<body>
    <main>
        <section id="plays" class="front">
            <div id="header">Select day to continue or start a new game</div>
            <div id="plays-body">
                <div class="save">
                    <div class="save-day">
                        <span class="top-day">day</span>
                        <span class="day">1</span>
                    </div>
                    <div class="new-game">
                        <img src="../assets/others/LoadButtonNew.png">
                    </div>
                </div>

            </div>
            <div id="footer">
                <div class="exit">
                    <img src="../assets/others/PushButton.png" alt="button">
                    <span>BACK</span>
                </div>
                <div id="delete">
                    <img src="../assets/others/LoadDelete.png" alt="sprite">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
