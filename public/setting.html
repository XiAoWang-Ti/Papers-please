<div id="setting-header-wrapper">
    <a href="" id="webpage-link"><img src="../assets/others/WebpageButton.png" alt="link" class="interactable"></a>
    <div id="setting-header">   
        <img src="../assets/others/ScreenHeader.png" alt="header">
        <span>SETTINGS</span>
    </div>

    <a href="" id="X-link"><img src="../assets/others/TwitterButton.png" alt="link" class="interactable"></a>
</div>
<div id="setting-options">
    <div id="fullscreen" class="setting-option">
        <span>Fullscreen</span>
        <div class="type-select">
            <img src="../assets/others/SettingButtonOff.png" class="interactable">
        </div>
    </div>
    <div id="nudity" class="setting-option">
        <span>Nudity</span>
        <div class="type-select">
            <img src="../assets/others/SettingButtonOff.png" class="interactable">
        </div>
    </div>
    <div id="easyMode" class="setting-option">
        <span>Easy Mode</span>
        <div class="type-select">
            <img src="../assets/others/SettingButtonOff.png" class="interactable">
        </div>
    </div>
    <div id="date" class="setting-option">
        <span>Date Format</span>
        <div class="type-text">
            <span>1982-1-23</span>
            <div class="minus-plus">
                <img src="../assets/others/SettingButtonMinus.png" class="interactable">
                <img src="../assets/others/SettingButtonPlus.png" class="interactable">
            </div>
        </div>
    </div>
    <div id="music" class="setting-option">
        <span>Music</span>
        <div class="type-audio">
            <div class="type-audio">
                <div class="audio-bar">
                    <img src="../assets/others/SettingsBar.png">
                </div>
                <div class="minus-plus">
                    <img src="../assets/others/SettingButtonMinus.png" class="interactable">
                    <img src="../assets/others/SettingButtonPlus.png" class="interactable">
                </div>
            </div>
        </div>
    </div>
    <div id="sound" class="setting-option">
        <span>Sound</span>
        <div class="type-audio">
            <div class="audio-bar">
                <img src="../assets/others/SettingsBar.png">
            </div>
            <div class="minus-plus">
                <img src="../assets/others/SettingButtonMinus.png" class="interactable">
                <img src="../assets/others/SettingButtonPlus.png" class="interactable">
            </div>
        </div>
    </div>
    <div id="language" class="setting-option">
        <span>Language</span>
        <div class="type-text">
            <span>ENGLISH</span>
            <div class="minus-plus">
                <img src="../assets/others/SettingButtonMinus.png" class="interactable">
                <img src="../assets/others/SettingButtonPlus.png" class="interactable">
            </div>
        </div>
    </div>
</div>
<div class="exit">
    <img src="../assets/others/PushButton.png" alt="button">
    <span class="interactable">DONE</span>
</div>
